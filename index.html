<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Keyword Pro - Advanced SEO Tool</title>
    <meta name="description" content="Generate high-ranking keywords in seconds" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gray: {
                900: '#111827',
              }
            },
            animation: {
              'blob': 'blob 7s infinite',
              'logo-pulse': 'logo-pulse 4s infinite ease-in-out',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              'logo-pulse': {
                '0%, 100%': { boxShadow: '0 0 0 0 rgba(37, 99, 235, 0)' },
                '50%': { boxShadow: '0 0 20px 2px rgba(37, 99, 235, 0.4)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #FDFDFE; 
        color: #111827;
      }
      /* Adaptive Theme Transition for Smooth Mode Switching */
      body, div, section, header, footer, nav, button, input, table, tr, td, th, p, h1, h2, h3, h4, h5, h6, span, svg, a {
        transition-property: background-color, border-color, color, fill, stroke, box-shadow;
        transition-duration: 500ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      .glass-effect {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      
      /* Mobile Friendly Settings */
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        .container, .main-section {
          width: 100% !important;
          flex-direction: column !important;
        }
        /* Scoped to form elements to prevent breaking header/icon buttons */
        form input, form button, .full-width-mobile {
          width: 100% !important;
          font-size: 16px;
        }
      }
    </style>

  }
}
</script>
